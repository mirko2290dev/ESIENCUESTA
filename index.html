<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio Encuesta ESI</title>

<style>
  :root{
    --bg:#ffe4ec;
    --card:#ffffff;
    --accent:#ff85a2;
    --accent2:#d63384;
    --soft:#fff0f5;
    --border:#f3c7d4;
    --text:#2f2f2f;
    --muted:#6b7280;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#ffe4ec 0%, #fff7fa 100%);
    color:var(--text);
    padding:24px;
  }
  .wrap{max-width:920px;margin:0 auto}
  .card{
    background:var(--card);
    border:1px solid rgba(255,133,162,.2);
    border-radius:22px;
    box-shadow:0 12px 30px rgba(214,51,132,.08);
    padding:22px;
  }
  .center{text-align:center}
  h1{color:var(--accent2); font-size:32px}
  .muted{color:var(--muted)}
  .question{margin:14px 0}
  .qtitle{display:block;font-weight:700;margin-bottom:8px}
  select{
    width:100%;
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
    background:#fff;
    font-size:15px;
  }
  button{
    border:none;
    background:var(--accent);
    color:white;
    padding:14px 18px;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 22px rgba(255,133,162,.25);
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="card center">
      <h1>Encuesta ESI</h1>
      <p class="muted">El curso se completa una sola vez al inicio. Después la encuesta avanza automáticamente.</p>

      <form onsubmit="iniciarEncuesta(); return false;" style="max-width:360px;margin:24px auto 0;">
        
        <div class="question">
          <label class="qtitle">Curso</label>
          <select id="curso" required>
            <option value="">Elegí una opción</option>
            <option value="1°">1°</option>
            <option value="2°">2°</option>
            <option value="3°">3°</option>
            <option value="4°">4°</option>
            <option value="5°">5°</option>
            <option value="6°">6°</option>
            <option value="Prefiero no responder">Prefiero no responder</option>
          </select>
        </div>

        <div class="question">
          <label class="qtitle">División</label>
          <select id="division" required>
            <option value="">Elegí una opción</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>

        <button type="submit">Comenzar</button>
      </form>

    </div>
  </div>

<script>
function iniciarEncuesta() {
  const userId = Date.now().toString();

  const datosUsuario = {
    curso: document.getElementById("curso").value,
    division: document.getElementById("division").value,
    respuestas: {}
  };

  localStorage.setItem("usuarioActual", userId);

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {};
  usuarios[userId] = datosUsuario;
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  // Ir a la siguiente página
  window.location.href = "sexualidad.html";
}
</script>

</body>
</html>
